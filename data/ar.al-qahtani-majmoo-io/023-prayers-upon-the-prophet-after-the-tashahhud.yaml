title: الصلاة على النبي ﷺ بعد التشهد
chapter: 23
items: 
  - parts: 
      - type: zikr
        text: اللَّهُـمَّ صَلِّ عَلَـى مُحَمَّـدٍ، وَعَلَـى آلِ مُحَمَّدٍ، كَمَـا صَلَّيْـتَ عَلَـى إِبْرَاهِـيمَ وَعَلَـى آلِ إِبْرَاهِـيمَ، إِنَّكَ حَمِـيدٌ مَجِـيدٌ ، اللَّهُـمَّ بَارِكْ عَلَـى مُحَمَّـدٍ، وَعَلَـى آلِ مُحَمَّـدٍ، كَمَـا بَارَكْتَ عَلَـى إِبْرَاهِـيمَ وَعَلَـى آلِ إِبْرَاهِيمَ، إِنَّكَ حَمِـيدٌ مَجِـيدٌ
    reference: "Al-Bukhari, cf. Al-Asqalani, Fathul-Bari 6/408."
  - parts: 
      - type: zikr
        text: اللَّهُـمَّ صَلِّ عَلَـى مُحَمَّـدٍ وَعَلَـى أَزْوَاجِـهِ وَذُرِّيَّـتِهِ، كَمَـا صَلَّيْـتَ عَلَـى آلِ إِبْرَاهِـيمَ . وَبَارِكْ عَلَـى مُحَمَّـدٍ وَعَلَـى أَزْوَاجِـهِ وَذُرِّيَّـتِهِ، كَمَـا بَارَكْتَ عَلَـى آلِ إِبْرَاهِـيمَ . إِنَّكَ حَمِـيدٌ مَجِـيدٌ
    reference: "Al-Bukhari, from Al-Asqalani, Fathul-Bari 6/ 407, Muslim 1/306."
topics: 
