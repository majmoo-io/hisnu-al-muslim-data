title: دعاء الاستفتاح
chapter: 16
items: 
  - parts: 
      - type: zikr
        text: اللّهُـمَّ باعِـدْ بَيـني وَبَيْنَ خَطـايايَ كَما باعَدْتَ بَيْنَ المَشْرِقِ وَالمَغْرِبْ ، اللّهُـمَّ نَقِّنـي مِنْ خَطايايَ كَمـا يُـنَقَّى الثَّـوْبُ الأَبْيَضُ مِنَ الدَّنَسْ ، اللّهُـمَّ اغْسِلْنـي مِنْ خَطايـايَ بِالثَّلـجِ وَالمـاءِ وَالْبَرَدْ.
    reference: "Al-Bukhari 1/181, Muslim 1/419."
  - parts: 
      - type: zikr
        text: سُبْـحانَكَ اللّهُـمَّ وَبِحَمْـدِكَ وَتَبارَكَ اسْمُـكَ وَتَعـالى جَـدُّكَ وَلا إِلهَ غَيْرُك
    reference: "Abu Dawud, Ibn Majah, An-Nasa'i, At-Tirmidhi. See Al-Albani, Sahih At-Tirmidhi 1/77 and Sahih Ibn Majah 1/135."
  - parts: 
      - type: zikr
        text: وَجَّهـتُ وَجْهِـيَ لِلَّذي فَطَرَ السَّمـواتِ وَالأَرْضَ حَنـيفَاً وَمـا أَنا مِنَ المشْرِكين ، إِنَّ صَلاتـي ، وَنُسُكي ، وَمَحْـيايَ ، وَمَماتـي للهِ رَبِّ العالَمين ، لا شَريـكَ لَهُ وَبِذلكَ أُمِرْتُ وَأَنا مِنَ المسْلِـمين. اللّهُـمَّ أَنْتَ المَلِكُ لا إِلهَ إِلاّ أَنْت، أَنْتَ رَبِّـي وَأَنـا عَبْـدُك ، ظَلَمْـتُ نَفْسـي وَاعْـتَرَفْتُ بِذَنْبـي فَاغْفِرْ لي ذُنوبي جَميعاً إِنَّـه لا يَغْـفِرُ الذُّنـوبَ إلاّ أَنْت. وَاهْدِنـي لأَحْسَنِ الأَخْلاقِ لا يَهْـدي لأَحْسَـنِها إِلاّ أَنْـت ، وَاصْـرِف عَـنّْي سَيِّئَهـا، لا يَصْرِفُ عَـنّْي سَيِّئَهـا إِلاّ أَنْـت، لَبَّـيْكَ وَسَعْـدَيْك، وَالخَـيْرُ كُلُّـهُ بِيَـدَيْـك، وَالشَّرُّ لَيْـسَ إِلَـيْك ، أَنا بِكَ وَإِلَيْـك ، تَبـارَكْتَ وَتَعـالَيتَ أَسْتَغْـفِرُكَ وَأَتوبُ إِلَـيك
    reference: Muslim 1/534
  - parts: 
      - type: zikr
        text: اللّهُـمَّ رَبَّ جِـبْرائيل ، وَميكـائيل ، وَإِسْـرافيل، فاطِـرَ السَّمواتِ وَالأَرْض ، عالـِمَ الغَيْـبِ وَالشَّهـادَةِ أَنْـتَ تَحْـكمُ بَيْـنَ عِبـادِكَ فيـما كانوا فيهِ يَخْتَلِفـون. اهدِنـي لِمـا اخْتُـلِفَ فيـهِ مِنَ الْحَـقِّ بِإِذْنِك ، إِنَّـكَ تَهْـدي مَنْ تَشـاءُ إِلى صِراطٍ مُسْتَقـيم
    reference: Muslim 1/534
  - parts: 
      - type: zikr
        text: اللهُ أَكْبَـرُ كَبـيرا ، اللهُ أَكْبَـرُ كَبـيرا ، اللهُ أَكْبَـرُ كَبـيرا ، وَالْحَـمْدُ للهِ كَثـيرا ، وَالْحَـمْدُ للهِ كَثـيرا ، وَالْحَـمْدُ للهِ كَثـيرا ، وَسُبْـحانَ اللهِ بكْـرَةً وَأَصيـلا.
      - type: instruction
        text: ( ثَلاثاً )
      - type: zikr
        text: أَعـوذُ بِاللهِ مِنَ الشَّـيْطانِ مِنْ نَفْخِـهِ وَنَفْـثِهِ وَهَمْـزِه
    reference: "Abu Dawud 1/203, Ibn Majah 1/265, ai Ahmad 4/85. Muslim recorded a similar Hadil 1/420."
  - parts: 
      - type: zikr
        text: "اللّهُـمَّ لَكَ الْحَمْدُ أَنْتَ نـورُ السَّمـواتِ وَالأَرْضِ وَمَنْ فيـهِن ، وَلَكَ الْحَمْدُ أَنْتَ قَـيِّمُ السَّـمواتِ وَالأَرْضِ وَمَنْ فيـهِن ، [وَلَكَ الْحَمْدُ أَنْتَ رَبُّ السَّـمواتِ وَالأَرْضِ وَمَنْ فيـهِن] [وَلَكَ الْحَمْدُ لَكَ مُلْـكُ السَّـمواتِ وَالأَرْضِ وَمَنْ فيـهِن] [وَلَكَ الْحَمْدُ أَنْتَ مَلِـكُ السَّـمواتِ وَالأَرْضِ ] [وَلَكَ الْحَمْدُ] [أَنْتَ الْحَـقّ وَوَعْـدُكَ الْحَـق ، وَقَوْلُـكَ الْحَـق ، وَلِقـاؤُكَ الْحَـق ، وَالْجَـنَّةُحَـق ، وَالنّـارُ حَـق ، وَالنَّبِـيّونَ حَـق ، وَمـحَمَّدٌ حَـق ، وَالسّـاعَةُحَـق] [اللّهُـمَّ لَكَ أَسْلَمت ، وَعَلَـيْكَ تَوَكَّلْـت ، وَبِكَ آمَنْـت ، وَإِلَـيْكَ أَنَبْـت ، وَبِـكَ خاصَمْت ، وَإِلَـيْكَ حاكَمْـت . فاغْفِـرْ لي مـا قَدَّمْتُ ، وَما أَخَّـرْت ، وَما أَسْـرَرْت ، وَما أَعْلَـنْت ] [أَنْتَ المُقَـدِّمُ وَأَنْتَ المُـؤَخِّر ، لا إِاـهَ إِلاّ أَنْـت] [أَنْـتَ إِلـهي لا إِاـهَ إِلاّ أَنْـت"
    reference: "Al-Bukhari, cf. Al-Asqalani, Fathul-Bari 3/3 , 11/ 116, 13/371, 423, 465. See also Muslim for a shorter account, 1/532."