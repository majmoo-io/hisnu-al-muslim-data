title: الدعاء للمريض في عيادته
chapter: 49
items: 
  - parts: 
      - type: zikr
        text: لا بأْسَ طَهـورٌ إِنْ شـاءَ الله
    reference: "Al-Bukhari, cf. Al-Asqalani Fathul-Bari 10/118."
  - parts: 
      - type: zikr
        text: أَسْـأَلُ اللهَ العَـظيـم، رَبَّ العَـرْشِ العَـظيـم أَنْ يَشْفـيك . (سبع مرات)
    reference: "At-Tirmidhi, Abu Dawud. See also Al-Albani, Sahih At-Tirmidhi 2/210 and Sahihul-Jami' As-Saghir 5/180."