title: الدعاء قضاء الدين
chapter: 41
items: 
  - parts: 
      - type: zikr
        text: اللّهُـمَّ اكْفِـني بِحَلالِـكَ عَنْ حَـرامِـك، وَأَغْنِـني بِفَضْـلِكَ عَمَّـنْ سِـواك
    reference: "At-Tirmidhi 5/560. See also Al-Albani, Sahih At-Tirmidhi 3/180."
  - parts: 
      - type: zikr
        text: اللَّهُمَّ إِنِّي أَعُوذُ بِكَ مِنَ الْهَمِّ وَالْحَزَنِ، وَالْعَجْزِ وَالْكَسَلِ، وَالْبُخْلِ وَالْجُبْنِ، وَضَلَعِ الدَّيْنِ وَغَلَبَةِ الرِّجَالِ
    reference: Al-Bukhari 7/158.