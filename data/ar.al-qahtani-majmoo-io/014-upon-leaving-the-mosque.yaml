        text: بِسْمِ اللَّهِ وَالصَّلَاةُ وَالسَّلَامُ عَلَى رَسُولِ اللَّهِ، اللَّهُـمَّ إِنِّـي أَسْأَلُكَ مِـنْ فَضْـلِكَ، اللَّهُـمَّ اعْصِمْنِـي مِنَ الشَّيْـطَانِ الرَّجِـيمِ
    reference: ibid.
