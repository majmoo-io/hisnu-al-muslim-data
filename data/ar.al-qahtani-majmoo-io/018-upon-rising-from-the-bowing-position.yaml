title: دعاء الرفع من الركوع
chapter: 18
items: 
  - parts: 
      - type: zikr
        text: سَمِعَ اللَّهُ لِمَنْ حَمِدَهُ
    reference: "Al-Bukhari, cf. Al-Asqalani, Fathul-Bari 2/282."
  - parts: 
      - type: zikr
        text: رَبَّنَا وَلَكَ الْحَمْدُ حَمْداً كَثِيراً طَيِّباً مُبَارَكاً فِيهِ
    reference: "Al-Bukhari, cf. Al-Asqalani, Fathul-Bari 2/284."
  - parts: 
      - type: zikr
        text: مِلْءَ السَّمَاوَاتِ وَمِلْءَ الْأَرْضِ، وَمَا بَيْنَهُمَا، وَمِلْءَ مَا شِئْتَ مِنْ شَيْءٍ بَعْدُ. أَهْلَ الثَّنَاءِ وَالْمَجْدِ، أَحَقُّ مَا قَالَ الْعَبْدُ، وَكُلُّنَا لَكَ عَبْدٌ. اللَّهُمَّ لَا مَانِعَ لِمَا أَعْطَيْتَ، وَلَا مُعْطِيَ لِمَا مَنَعْتَ، وَلَا يَنْفَعُ ذَا الْجَدِّ مِنْكَ الْجَدُّ
    reference: Muslim 1/346.
topics: 
  - Prayer
  - Salah