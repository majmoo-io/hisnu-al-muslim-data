title: الدعاء يوم عرفة
chapter: 119
items: 
  - parts: 
      - type: zikr
        text: "خَيْرُ الدُّعَاءِ دُعَاءُ يَوْمِ عَرَفَةَ، وَخَيْرُ مَا قُلْتُ أَنَا وَالنَّبِيُّونَ مِنْ قَبْلِي: لَا إِلَهَ إِلَّا اللَّهُ وَحْدَهُ لَا شَرِيكَ لَهُ، لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ."
    reference: "At-Tirmidhi. Al-Albani graded it good in Sahih At-Tirmidhi 3/184, and also Silsilatul-'Ahadith As-Sahihah 4/6."
topics: 
  - Hajj
  - Adhkar