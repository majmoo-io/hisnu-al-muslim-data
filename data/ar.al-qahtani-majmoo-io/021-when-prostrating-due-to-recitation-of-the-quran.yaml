title: دعاء سجود التلاوة
chapter: 21
items: 
  - parts: 
      - type: zikr
        text: سَجَدَ وَجْهِي لِلَّذِي خَلَقَهُ وَشَقَّ سَمْعَهُ وَبَصَرَهُ بِحَوْلِهِ وَقُوَّتِهِ ﴿فَتَبَارَكَ اللَّهُ أَحْسَنُ الْخَالِقِينَ﴾.
    reference: "At-Tirmidhi 2/474, Ahmad 6/30, and Al-Hakim"
  - parts: 
      - type: zikr
        text: اللَّهُمَّ اكْتُبْ لِي بِهَا عِنْدَكَ أَجْراً ، وَضَعْ عَنِّي بِهَا وِزْراً ، وَاجْعَلْهَا لِي عِنْدَكَ ذُخْراً ، وَتَقَبَّلْهَا مِنِّي كَمَا تَقَبَّلْتَهَا مِنْ عَبْدِكَ دَاوُدَ.
    reference: "At-Tirmidhi 2/473, and Al-Hakim who graded it authentic and Ath-Thahabi agreed 1/219."
topics: 
  - Quran
  - Prostration