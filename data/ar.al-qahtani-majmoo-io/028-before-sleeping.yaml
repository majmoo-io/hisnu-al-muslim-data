title: أذكار النوم
chapter: 28
items: 
  - parts: 
      - type: zikr
        text: "يَجْمَعُ كَفَّيْهِ ثُمَّ يَنْفُثُ فِيهِمَا فَيَقْرَأُ فِيهِمَا: بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ {قُلْ هُوَ اللَّهُ أَحَدٌ * اللَّهُ الصَّمَدُ * لَمْ يَلِدْ وَلَمْ يُولَدْ * وَلَمْ يَكُنْ لَهُ كُفُوًا أَحَدٌ}. بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ {قُلْ أَعُوذُ بِرَبِّ الْفَلَقِ * مِنْ شَرِّ مَا خَلَقَ * وَمِنْ شَرِّ غَاسِقٍ إِذَا وَقَبَ * وَمِنْ شَرِّ النَّفَّاثَاتِ فِي الْعُقَدِ * وَمِنْ شَرِّ حَاسِدٍ إِذَا حَسَدَ}. بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ {قُلْ أَعُوذُ بِرَبِّ النَّاسِ * مَلِكِ النَّاسِ * إِلَهِ النَّاسِ * مِنْ شَرِّ الْوَسْوَاسِ الْخَنَّاسِ * الَّذِي يُوَسْوِسُ فِي صُدُورِ النَّاسِ * مِنَ الْجِنَّةِ وَالنَّاسِ} ثُمَّ يَمْسَحُ بِهِمَا مَا اسْتَطَاعَ مِنْ جَسَدِهِ يَبْدَأُ بِهِمَا عَلَى رَأْسِهِ وَوَجْهِهِ وَمَا أَقْبَلَ مِنْ جَسَدِهِ (يَفْعَلُ ذَلِكَ ثَلَاثَ مَرَّاتٍ)"
    reference: "Al-Bukhari, cf. Al-Asqalani, Fathul-Bari 9/62, and Muslim 4/ 1723."
  - parts: 
      - type: zikr
        text: ((اللَّهُ لَا إِلَهَ إِلَّا هُوَ الْحَيُّ الْقَيُّومُ لَا تَأْخُذُهُ سِنَةٌ وَلَا نَوْمٌ لَهُ مَا فِي السَّمَاوَاتِ وَمَا فِي الْأَرْضِ مَنْ ذَا الَّذِي يَشْفَعُ عِنْدَهُ إِلَّا بِإِذْنِهِ يَعْلَمُ مَا بَيْنَ أَيْدِيهِمْ وَمَا خَلْفَهُمْ وَلَا يُحِيطُونَ بِشَيْءٍ مِنْ عِلْمِهِ إِلَّا بِمَا شَاءَ وَسِعَ كُرْسِيُّهُ السَّمَاوَاتِ وَالْأَرْضَ وَلَا يَئُودُهُ حِفْظُهُمَا وَهُوَ الْعَلِيُّ الْعَظِيمُ))
    reference: "Al-Baqarah 2:255. Whoever reads this when he lies down to sleep will have a guardian from Allah remain with him and Satan will not be able to come near him until he rises in the morning. See Al-Bukhari, cf. Al-Asqalani, Fathul-Bari 4/487."
  - parts: 
      - type: zikr
        text: "((ءَامَنَ الرَّسُولُ بِمَا أُنْزِلَ إِلَيْهِ مِنْ رَبِّهِ وَالْمُؤْمِنُونَ كُلٌّ ءَامَنَ بِاللَّهِ وَمَلَائِكَتِهِ وَكُتُبِهِ وَرُسُلِهِ لَا نُفَرِّقُ بَيْنَ أَحَدٍ مِنْ رُسُلِهِ وَقَالُوا سَمِعْنَا وَأَطَعْنَا غُفْرَانَكَ رَبَّنَا وَإِلَيْكَ الْمَصِيرُ {285} لَا يُكَلِّفُ اللَّهُ نَفْسًا إِلَّا وُسْعَهَا لَهَا مَا كَسَبَتْ وَعَلَيْهَا مَا اكْتَسَبَتْ رَبَّنَا لَا تُؤَاخِذْنَا إِنْ نَسِينَا أَوْ أَخْطَأْنَا رَبَّنَا وَلَا تَحْمِلْ عَلَيْنَا إِصْرًا كَمَا حَمَلْتَهُ عَلَى الَّذِينَ مِنْ قَبْلِنَا رَبَّنَا وَلَا تُحَمِّلْنَا مَا لَا طَاقَةَ لَنَا بِهِ وَاعْفُ عَنَّا وَاغْفِرْ لَنَا وَارْحَمْنَا أَنْتَ مَوْلَانَا فَانْصُرْنَا عَلَى الْقَوْمِ الْكَافِرِينَ {286}))"
    reference: "Al-Baqarah 2:285-6. These two Verses will be sufficient for anyone who recites them at night before sleeping. Al-Bukhari, cf. Al-Asqalani, Fathul-Bari.9/94, Muslim 1/554."
  - parts: 
      - type: zikr
        text: بِاسْمِكَ رَبِّي وَضَعْتُ جَنْبِي، وَبِكَ أَرْفَعُهُ، فَإِنْ أَمْسَكْتَ نَفْسِي فَارْحَمْهَا، وَإِنْ أَرْسَلْتَهَا فَاحْفَظْهَا بِمَا تَحْفَظُ بِهِ عِبَادَكَ الصَّالِحِينَ
    reference: "1 \"If any of you rises from his bed and later returns to it, let him dust off his bed with his waist garment three times and mention the Name of Allah, for he does not know what may have entered the bed after him, and when he lies down he should say. . . \". 2 Al-Bukhari 1 1/ 126 and Muslim 4/2084."
  - parts: 
      - type: zikr
        text: اللَّهُمَّ إِنَّكَ خَلَقْتَ نَفْسِي وَأَنْتَ تَوَفَّاهَا، لَكَ مَمَاتُهَا وَمَحْيَاهَا، إِنْ أَحْيَيْتَهَا فَاحْفَظْهَا، وَإِنْ أَمَتَّهَا فَاغْفِرْ لَهَا. اللَّهُمَّ إِنِّي أَسْأَلُكَ الْعَافِيَةَ
    reference: Muslim 4/2083 and Ahmad 2/79.
  - parts: 
      - type: zikr
        text: اللَّهُـمَّ قِنِـي عَذَابَـكَ يَـوْمَ تَبْـعَثُ عِبَـادَكَ .
    reference: "1 \"When the Prophet (ﷺ) wanted to lie down to sleep, he used to place his right hand under his cheek and say...\" 2 Abu Dawud 4/311. See also Al-Albani, Sahih At-Tirmidhi 3/143."
  - parts: 
      - type: zikr
        text: بِاسْـمِكَ اللَّهُـمَّ أَمُـوتُ وَأَحْـيَا
    reference: "Here, dying and living are metaphors for sleep and wakefulness. This explains why the normal order of these words has been reversed in this Hadith. In other contexts the living is mentioned before dying. See Qur'an Al-Baqarah 2:258, Aal-'Imrdn 3:156, Al-A'raf 7:158 among many other examples, (trans.). See also Al-Asqalani, Fathul-Bari 11/113, Muslim 4/ 2083."
  - parts: 
      - type: zikr
        text: سُبْحَانَ اللَّهِ (ثَلَاثًا وَثَلَاثِينَ) وَالْحَمْدُ لِلَّهِ (ثَلَاثًا وَثَلَاثِينَ) وَاللَّهُ أَكْبَرُ (أَرْبَعًا وَثَلَاثِينَ)
    reference: "Al-Bukhari, cf. Al-Asqalani, Fathul-Bari 7/71, Muslim 4/2091."
  - parts: 
      - type: zikr
        text: اللَّهُـمَّ رَبَّ السَّمَـاوَاتِ السَّبْـعِ وَرَبَّ الْعَـرْشِ الْعَظِـيمِ رَبَّنَـا وَرَبَّ كُـلِّ شَـيْءٍ فَالِـقَ الْحَـبِّ وَالنَّـوَى وَمُـنَزِّلَ التَّـوْرَاةِ وَالْإِنْجِـيلِ وَالْفُـرْقَانِ أَعُـوذُ بِـكَ مِنْ شَـرِّ كُـلِّ شَـيْءٍ أَنْـتَ آخِـذٌ بِنَـاصِـيَتِهِ اللَّهُـمَّ أَنْـتَ الْأَوَّلُ فَلَـيْسَ قَبْـلَكَ شَيْءٌ وَأَنْـتَ الْآخِـرُ فَلَـيْسَ بَعْـدَكَ شَيْءٌ وَأَنْـتَ الظَّـاهِـرُ فَلَـيْسَ فَـوْقَـكَ شَيْءٌ وَأَنْـتَ الْبَـاطِـنُ فَلَـيْسَ دُونَـكَ شَيْءٌ اقْـضِ عَنَّـا الدَّيْـنَ وَأَغْـنِنَـا مِنَ الْفَـقْرِ
    reference: "1 The Scripture that was revealed to 'Isa (Jesus). 2 See Qur'an Al-'Alaq 96:15, where seizure by the forelock preceeds being cast into Hell. (Translator) 3 Muslim 4/2084."
  - parts: 
      - type: zikr
        text: الْحَمْدُ لِلَّهِ الَّذِي أَطْعَمَنَا وَسَقَانَا، وَكَفَانَا، وَآوَانَا، فَكَمْ مِمَّنْ لَا كَافِيَ لَهُ وَلَا مُؤْوِيَ
    reference: Muslim 4/2085.
  - parts: 
      - type: zikr
        text: اللَّهُـمَّ عَالِـمَ الْغَـيْبِ وَالشَّـهَادَةِ فَاطِـرَ السَّمَاوَاتِ وَالْأَرْضِ رَبَّ كُـلِّ شَـيْءٍ وَمَلِيـكَهُ أَشْهَـدُ أَنْ لَا إِلَـهَ إِلَّا أَنْتَ أَعُـوذُ بِكَ مِنْ شَـرِّ نَفْسِـي وَمِنْ شَـرِّ الشَّيْـطَانِ وَشِـرْكِهِ وَأَنْ أَقْتَـرِفَ عَلَـى نَفْسِـي سُوءًا أَوْ أَجُـرَّهُ إِلَـى مُسْـلِمٍ
    reference: "Abu Dawud 4/317. See also Al-Albani, SahihAt-Tirmidhi 3/142."
  - parts: 
      - type: zikr
        text: يَقْرَأُ ((ألم * تَنْزِيل)) السَّجْدَةِ، وَ((تَبَارَكَ الَّذِي بِيَدِهِ الْمُلْكُ))
    reference: "At-Tirmidhi, An-Nasa'i. See also Al-Albani, Sahihul-Jami ' As-Saghir 4/255"
  - parts: 
      - type: zikr
        text: اللَّهُـمَّ أَسْـلَمْتُ نَفْسِـي إِلَـيْكَ، وَفَوَّضْـتُ أَمْـرِي إِلَـيْكَ، وَوَجَّـهْتُ وَجْـهِي إِلَـيْكَ، وَأَلْـجَأْتُ ظَهْـرِي إِلَـيْكَ، رَغْبَـةً وَرَهْـبَةً إِلَـيْكَ، لَا مَلْجَـأَ وَلَا مَنْـجَـا مِنْـكَ إِلَّا إِلَـيْكَ، آمَنْـتُ بِكِتَـابِكَ الَّـذِي أَنْزَلْـتَ وَبِنَبِـيِّـكَ الَّـذِي أَرْسَلْـتَ
    reference: "1 \"Before you go to bed perform ablutions as you would for prayer, then lie down on your right side and say. . . \" The Prophet (ﷺ) said: \"Whoever says this and dies in his sleep, has died in a state of the natural monotheism (Fitrah).\" Al-Bukhari, cf. Al-Asqalani, Fathul-Bari 11/113, Muslim 4/2081."
topics: 
