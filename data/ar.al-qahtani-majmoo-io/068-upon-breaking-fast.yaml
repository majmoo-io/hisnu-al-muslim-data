title: الدعاء عند إفطار الصائم
chapter: 68
items: 
  - parts: 
      - type: zikr
        text: ذَهَبَ الظَّمَأُ، وَابْتَلَّتِ الْعُرُوقُ، وَثَبَتَ الْأَجْرُ إِنْ شَاءَ اللَّهُ
    reference: "Abu Dawud 2/306 and others. See also Al- Albani, Sahihul-Jami' As-Saghir 4/209."
  - parts: 
      - type: zikr
        text: اللَّهُمَّ إِنِّي أَسْأَلُكَ بِرَحْمَتِكَ الَّتِي وَسِعَتْ كُلَّ شَيْءٍ، أَنْ تَغْفِرَ لِي
    reference: "Ibn Majah 1/557 from a supplication of Abdullah bin 'Amr. Al-Hafidh graded it as good in his checking of An-Nawawi's Kitabul-'Athkdr. See Sharhul- Athkar 4/342."
topics: 
  - Fasting
  - Ramadan