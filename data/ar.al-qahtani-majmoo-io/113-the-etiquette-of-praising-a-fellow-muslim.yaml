title: ما يقول المسلم إذا مدح المسلم
chapter: 113
items: 
  - parts: 
      - type: zikr
        text: "قَالَ صَلَّى اللَّهُ عَلَيْهِ وَسَلَّمَ: \"إِذَا كَانَ أَحَدُكُمْ مَادِحاً صَاحِبَهُ لاَ مَحَالَةَ فَلْيَقُلْ: أَحْسِبُ فُلاَناً وَاللَّهُ حَسِيبُهُ، وَلاَ أُزَكِّي عَلَى اللَّهِ أَحَداً، أَحْسِبُهُ – إِنْ كَانَ يَعْلَمُ ذَاكَ – كَذَا وَكَذَا\""
    reference: Muslim 4/2296.
topics: 
  - Character
  - Social