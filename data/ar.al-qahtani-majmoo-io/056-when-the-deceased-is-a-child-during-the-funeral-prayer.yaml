title: الدعاء للفرط في الصلاة عليه
chapter: 56
items: 
  - parts: 
      - type: zikr
        text: "\"اللَّهُمَّ أَعِذْهُ مِنْ عَذَابِ الْقَبْرِ \" وَإِنْ قَالَ: \"اللَّهُمَّ اجْعَلْهُ فَرَطاً وَذُخْراً لِوَالِدَيْهِ ، وَشَفِيعاً مُجَاباً . اللَّهُمَّ ثَقِّلْ بِهِ مَوَازِينَهَا وَأَعْظِمْ بِهِ أُجُورَهُمَا ، وَأَلْحِقْهُ بِصَالِحِ الْمُؤْمِنِينَ ، وَاجْعَلْهُ فِي كَفَالَةِ إِبْرَاهِيمَ ، وَقِهِ بِرَحْمَتِكَ عَذَابَ الْجَحِيمِ ، وَأَبْدِلْهُ دَاراً خَيْراً مِنْ دَارِهِ ، وَأَهْلاً خَيْراً مِنْ أَهْلِهِ ، اللَّهُمَّ اغْفِرْ لِأَسْلَافِنَا ، وَأَفْرَاطِنَا ، وَمَنْ سَبَقَنَا بِالْإِيمَانِ \" فَحَسَنٌ"
    reference: "Ibn Qudamah, Al-Mughni 3/416 and Ad-Duroosul-Muhimmah li-Aammatil-'Ummah, pg. 15, by Shaikh 'Abdul-'Aziz bin Baz."
  - parts: 
      - type: zikr
        text: اللَّهُـمَّ اجْعَلْـهُ لَنَا فَرَطـاً، وَسَلَـفاً وَأَجْـراً
    reference: "Al-Hasan (Al-Basri) used to recite Surat Al-Fatihah for a child's funeral and then say this. Al-Bukhari, Kitabul-Jana'iz, p. 65."
topics: 
  - Funerals
  - Children