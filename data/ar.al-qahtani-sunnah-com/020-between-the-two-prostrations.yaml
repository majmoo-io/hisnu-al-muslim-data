title: دعاء الجلسة بين السجدتين
chapter: 20
items: 
  - parts: 
      - type: zikr
        text: رَبِّ اغْفِـرْ لي ، رَبِّ اغْفِـرْ لي
    reference: "Abu Dawud 1/231. See also Al-Albani, Sahihibn Mdjah 1/148."
  - parts: 
      - type: zikr
        text: اللّهُـمَّ اغْفِـرْ لي ، وَارْحَمْـني ، وَاهْدِنـي ، وَاجْبُرْنـي ، وَعافِنـي وَارْزُقْنـي وَارْفَعْـني
    reference: "Abu Dawud, Ibn Majah, At-Tirmidhi. See also Al-Albani, Sahih At-Tirmidhi 1/90 and Sahih Ibn Majah 1/148."