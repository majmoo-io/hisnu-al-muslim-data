title: دعاء المقيم للمسافر
chapter: 101
items: 
  - parts: 
      - type: zikr
        text: أَسْتَـوْدِعُ اللَّهَ ديـنَكَ وَأَمانَتَـكَ، وَخَـواتيـمَ عَمَـلِك
    reference: "Ahmad 2/7, At-Tirmidhi 5/499. See also Al-Albani, Sahih At-Tirmidhi 2/155."
  - parts: 
      - type: zikr
        text: زَوَّدَكَ اللَّهُ التقْوى، وَغَفَـرَذَنْـبَكَ، وَيَسَّـرَ لَكَ الخَـيْرَ حَيْـثُما كُنْـت
    reference: "At-Tirmidhi. See Al-Albani, Sahih At-Tirmidhi, 3/155."