title: دعاء الكرب
chapter: 35
items: 
  - parts: 
      - type: zikr
        text: لَا إلَهَ إِلَّا اللَّهُ الْعَظـيمُ الْحَلِـيمْ، لَا إِلَهَ إِلَّا اللَّهُ رَبُّ العَـرْشِ العَظِيـمِ، لَا إِلَـهَ إِلَّا اللَّهْ رَبُّ السَّمَـوّاتِ ورّبُّ الأَرْضِ ورَبُّ العَرْشِ الكَـريم
    reference: "Al-Bukhari 8/154, Muslim 4/2092"
  - parts: 
      - type: zikr
        text: اللّهُـمَّ رَحْمَتَـكَ أَرْجـو فَلا تَكِلـني إِلى نَفْـسي طَـرْفَةَ عَـيْن، وَأَصْلِـحْ لي شَأْنـي كُلَّـه لَا إِلَهَ إِلَّا أنْـت
    reference: "Abu Dawud 4/324, Ahmad 5/42. Al-Albani graded it as good in Sahih Abu Dawud 3/959."
  - parts: 
      - type: zikr
        text: لَا إِلَهَ إِلَّا أنْـت سُـبْحانَكَ إِنِّي كُنْـتُ مِنَ الظّـالِميـن
    reference: "At-Tirmidhi 5/529. Al-Hakim declared it authentic and Ath-Thahabi agreed with him 1/ 505. See also Al-Albani, Sahih At-Tirmidhi 3/168."
  - parts: 
      - type: zikr
        text: اللهُ اللهُ رَبِّي لا أُشْـرِكُ بِهِ شَيْـئاً
    reference: "Abu Dawud 2/87. See also Al-Albani, Sahih Ibn Mdjah 2/335."