title: الاستغفار والتوبة
chapter: 129
items: 
  - parts: 
      - type: zikr
        text: "قَالَ رَسُولُ اللَّهِ صَلَّى اللَّهُ عَلَيْهِ وَسَلَّمَ: \"وَاللَّهِ إِنِّي لَأَسْتَغْفِرُ اللَّهَ وَأَتُوبُ إِلَيْهِ فِي الْيَوْمِ أَكْثَرَ مِنْ سَبْعِينَ مَرَّةً\""
    reference: "Al-Bukhari, cf. Al-Asqalani, Fathul-Bari 11/101."
  - parts: 
      - type: zikr
        text: "وَقَالَ صَلَّى اللَّهُ عَلَيْهِ وَسَلَّمَ: (يَا أَيُّهَا النَّاسُ تُوبُوا إِلَى اللَّهِ فَإِنِّي أَتُوبُ فِي الْيَوْمِ إِلَيْهِ مِائَةَ مَرَّةٍ)"
    reference: Muslim 4/2076.
  - parts: 
      - type: zikr
        text: "وَقَالَ صَلَّى اللَّهُ عَلَيْهِ وَسَلَّمَ: مَنْ قَالَ (أَسْتَغْفِرُ اللَّهَ الْعَظِيمَ الَّذِي لَا إِلَهَ إِلَّا هُوَ الْحَيُّ الْقَيُّومُ وَأَتُوبُ إِلَيْهِ)، غَفَرَ اللَّهُ لَهُ وَإِنْ كَانَ فَرَّ مِنَ الزَّحْفِ."
    reference: "Abu Dawud 2/85, At-Tirmidhi 5/569, and Al-Hakim who declared it authentic and Ath-Thahabi agreed with him 1/511. Al-Albani graded it authentic in Sahih At-Tirmidhi 3/182. See also Jami'ul-'Usool li-'Ahdaith Ar-Rasool 4/ 389-90 checked by Al-Arna'ut."
  - parts: 
      - type: zikr
        text: "وَقَالَ صَلَّى اللَّهُ عَلَيْهِ وَسَلَّمَ: أَقْرَبُ مَا يَكُونُ الرَّبُّ مِنَ الْعَبْدِ فِي جَوْفِ اللَّيْلِ الْآخِرِ فَإِنِ اسْتَطَعْتَ أَنْ تَكُونَ مِمَّنْ يَذْكُرُ اللَّهَ فِي تِلْكَ السَّاعَةِ فَكُنْ"
    reference: "At-Tirmidhi, An-Nasa'i 1/279 and Al-Hakim. See also Al-Albani, Sahih At-Tirmidhi 3/183, and Jdmi'ul-'Usool with Al-Arna'ut's checking 4/144."
  - parts: 
      - type: zikr
        text: ".وَقَالَ صَلَّى اللَّهُ عَلَيْهِ وَسَلَّمَ: أَقْرَبُ مَا يَكُونُ الْعَبْدُ مِنْ رَبِّهِ وَهُوَ سَاجِدٌ فَأَكْثِرُوا الدُّعَاءَ."
    reference: Muslim 1/350.
  - parts: 
      - type: zikr
        text: ".وَقَالَ صَلَّى اللَّهُ عَلَيْهِ وَسَلَّمَ: إِنَّهُ لَيُغَانُ عَلَى قَلْبِي وَإِنِّي لَأَسْتَغْفِرُ اللَّهَ فِي الْيَوْمِ مِائَةَ مَرَّةٍ."
    reference: "Muslim 4/2075. Ibn 'Athir explains that the Prophet (ﷺ) was always vigilant in his remembrance and drawing near to Allah, and if he forgot to do any of what he normally did from time to time, or it slipped his mind, he felt as if he had wronged himself and so he would begin to seek the forgiveness of Allah. See Jami'ul-'Usool 4/386."
topics: 
  - Forgiveness
  - Repentance