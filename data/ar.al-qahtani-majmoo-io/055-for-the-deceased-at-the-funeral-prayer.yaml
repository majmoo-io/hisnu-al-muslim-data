title: الدعاء للميت في الصلاة عليه
chapter: 55
items: 
  - parts: 
      - type: zikr
        text: "اللَّهُمَّ اغْفِرْ لَهُ وَارْحَمْهُ ، وَعَافِهِ وَاعْفُ عَنْهُ ، وَأَكْرِمْ نُزُلَهُ ، وَوَسِّعْ مُدْخَلَهُ ، وَاغْسِلْهُ بِالْمَاءِ وَالثَّلْجِ وَالْبَرَدِ ، وَنَقِّهِ مِنَ الْخَطَايَا كَمَا نَقَّيْتَ الثَّوْبَ الْأَبْيَضَ مِنَ الدَّنَسِ ، وَأَبْدِلْهُ دَاراً خَيْراً مِنْ دَارِهِ ، وَأَهْلاً خَيْراً مِنْ أَهْلِهِ ، وَزَوْجاً خَيْراً مِنْ زَوْجِهِ ، وَأَدْخِلْهُ الْجَنَّةَ ، وَأَعِذْهُ مِنْ عَذَابِ الْقَبْرِ [وَعَذَابِ النَّارِ]"
    reference: Muslim 2/663.
  - parts: 
      - type: zikr
        text: اللَّهُمَّ اغْفِرْ لِحَيِّنَا وَمَيِّتِنَا ، وَشَاهِدِنَا وَغَائِبِنَا ، وَصَغِيرِنَا وَكَبِيرِنَا ، وَذَكَرِنَا وَأُنْثَانَا . اللَّهُمَّ مَنْ أَحْيَيْتَهُ مِنَّا فَأَحْيِهِ عَلَى الْإِسْلَامِ ، وَمَنْ تَوَفَّيْتَهُ مِنَّا فَتَوَفَّهُ عَلَى الْإِيمَانِ ، اللَّهُمَّ لَا تَحْرِمْنَا أَجْرَهُ ، وَلَا تُضِلَّنَا بَعْدَهُ
    reference: "Ibn Majah 1/480, Ahmad 2/368. See also Al-Albani, Sahih Ibn Majah 1/251."
  - parts: 
      - type: zikr
        text: اللَّهُمَّ إِنَّ فُلَانَ بْنَ فُلَانٍ فِي ذِمَّتِكَ ، وَحَبْلِ جِوَارِكَ ، فَقِهِ مِنْ فِتْنَةِ الْقَبْرِ وَعَذَابِ النَّارِ ، وَأَنْتَ أَهْلُ الْوَفَاءِ وَالْحَقِّ ، فَاغْفِرْ لَهُ وَارْحَمْهُ ، إِنَّكَ أَنْتَ الْغَفُورُ الرَّحِيمُ
    reference: "Ibn Majah, Abu Dawud 3/211. See also Al Albani, Sahih Ibn Majah 1/251."
  - parts: 
      - type: zikr
        text: اللَّهُمَّ عَبْدُكَ وَابْنُ أَمَتِكَ، احْتَاجَ إِلَى رَحْمَتِكَ، وَأَنْتَ غَنِيٌّ عَنْ عَذَابِهِ، إِنْ كَانَ مُحْسِناً فَزِدْ فِي حَسَنَاتِهِ، وَإِنْ كَانَ مُسِيئاً فَتَجَاوَزْ عَنْهُ
    reference: "Al-Hakim 1/359 who graded it authentic and Ath-Thahabi agreed with him. See also Al-Albani, Ahkamul-Jana'iz, p. 125."
topics: 
  - Funerals
  - Intercession