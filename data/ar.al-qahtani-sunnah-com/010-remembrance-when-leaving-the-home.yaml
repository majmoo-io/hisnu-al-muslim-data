title: الذكر عند الخروج من المنزل
chapter: 10
items: 
  - parts: 
      - type: zikr
        text: بِسْمِ اللهِ ، تَوَكَّلْـتُ عَلى اللهِ وَلا حَوْلَ وَلا قُـوَّةَ إِلاّ بِالله
    reference: "Abu Dawud 4/325, At-Tirmidhi 5/490. See also Al-Albani, Sahih At-Tirmidhi 3/151"
  - parts: 
      - type: zikr
        text: اللّهُـمَّ إِنِّـي أَعـوذُ بِكَ أَنْ أَضِـلَّ أَوْ أُضَـل ، أَوْ أَزِلَّ أَوْ أُزَل ، أَوْ أَظْلِـمَ أَوْ أَُظْلَـم ، أَوْ أَجْهَلَ أَوْ يُـجْهَلَ عَلَـيّ
    reference: "Abu Dawud, Ibn Majah, An-Nasa'i, At-Tirmidhi. See also Al-Albani, Sahih At-Tirmidhi 3/152 and Sahih Ibn Majah 2/336"