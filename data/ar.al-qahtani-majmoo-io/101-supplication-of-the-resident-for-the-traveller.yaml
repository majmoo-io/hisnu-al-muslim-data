title: دعاء المقيم للمسافر
chapter: 101
items: 
  - parts: 
      - type: zikr
        text: أَسْتَوْدِعُ اللَّهَ دِينَكَ وَأَمَانَتَكَ، وَخَوَاتِيمَ عَمَلِكَ
    reference: "Ahmad 2/7, At-Tirmidhi 5/499. See also Al-Albani, Sahih At-Tirmidhi 2/155."
  - parts: 
      - type: zikr
        text: زَوَّدَكَ اللَّهُ التَّقْوَى، وَغَفَرَ ذَنْبَكَ، وَيَسَّرَ لَكَ الْخَيْرَ حَيْثُمَا كُنْتَ
    reference: "At-Tirmidhi. See Al-Albani, Sahih At-Tirmidhi, 3/155."
topics: 
  - Travel
  - Farewell