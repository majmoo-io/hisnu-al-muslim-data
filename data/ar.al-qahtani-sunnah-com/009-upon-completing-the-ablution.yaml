title: الذكر بعد الفراغ من الوضوء
chapter: 9
items: 
  - parts: 
      - type: zikr
        text: أَشْهَدُ أَنْ لا إِلَـهَ إِلاّ اللهُ وَحْدَهُ لا شَريـكَ لَـهُ وَأَشْهَدُأَنَّ مُحَمّـداً عَبْـدُهُ وَرَسـولُـه
    reference: Muslim 1/209.
  - parts: 
      - type: zikr
        text: اللّهُـمَّ اجْعَلنـي مِنَ التَّـوّابينَ وَاجْعَـلْني مِنَ المتَطَهّـرين.
    reference: "At-Tirmidhi 1/78. See also Al-Albani, Sahih At- Tirmidhi 1/18"
  - parts: 
      - type: zikr
        text: سُبْحـانَكَ اللّهُـمَّ وَبِحَمدِك أَشْهَـدُ أَنْ لا إِلهَ إِلاّ أَنْتَ أَسْتَغْفِرُكَ وَأَتوبُ إِلَـيْك
    reference: "An-Nasa'i, 'Amalul-Yawm wal-Laylah, p. 173. See also Al-Albani, 'Irwa'ul-Ghalil 1/135 and 2/94."