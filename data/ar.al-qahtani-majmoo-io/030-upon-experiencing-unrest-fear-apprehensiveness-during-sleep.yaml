title: دعاء القلق والفزع في النوم ومن بلي بالوحشة
chapter: 30
items: 
  - parts: 
      - type: zikr
        text: أَعُوذُ بِكَلِمَاتِ اللَّهِ التَّامَّاتِ مِنْ غَضَبِهِ وَعِقَابِهِ وَشَرِّ عِبَادِهِ وَمِنْ هَمَزَاتِ الشَّيَاطِينِ وَأَنْ يَحْضُرُونِ
    reference: "Abu Dawud 4/12. See also Al-Albani, Sahih At- Tirmidhi 3/171"
topics: 
  - Sleep
