title: الدعاء عند رؤية باكورة الثمر
chapter: 76
items: 
  - parts: 
      - type: zikr
        text: اللّهُـمَّ بارِكْ لَنا في ثَمَـرِنا، وَبارِكْ لَنا في مَدينَتِنـا، وَبارِكْ لَنا في صاعِنـا، وَبارِكْ لَنا في مُدِّنا
    reference: "Muslim 2/1000 (Sa' and Mudd are both dry measures used for agricultural produce by the Arabs in the Prophet's time. Of the two, the So.' was the larger measure.) (Translator)"