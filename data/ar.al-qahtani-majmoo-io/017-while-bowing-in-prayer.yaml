title: دعاء الركوع
chapter: 17
items: 
  - parts: 
      - type: zikr
        text: سُبْحَانَ رَبِّيَ الْعَظِيمِ
      - type: instruction
        text: (ثلاث مرات)
    reference: "Abu Dawud, Ibn Majah, An-Nasa'i, At-Tirmidhi, and Ahmad. See Al-Albani's Sahih At-Tirmidhi 1/83."
  - parts: 
      - type: zikr
        text: سُبْحَانَكَ اللَّهُمَّ رَبَّنَا وَبِحَمْدِكَ ، اللَّهُمَّ اغْفِرْ لِي
    reference: "Al-Bukhari 1/99, Muslim 1/350."
  - parts: 
      - type: zikr
        text: سُبُّوحٌ قُدُّوسٌ ، رَبُّ الْمَلَائِكَةِ وَالرُّوحِ
    reference: "Muslim 1/353, Abu Dawud 1/230."
  - parts: 
      - type: zikr
        text: اللَّهُمَّ لَكَ رَكَعْتُ وَبِكَ آمَنْتُ، وَلَكَ أَسْلَمْتُ ، خَشَعَ لَكَ سَمْعِي، وَبَصَرِي ، وَمُخِّي، وَعَظْمِي، وَعَصَبِي ، وَمَا اسْتَقَلَّ بِهِ قَدَمِي
    reference: "Muslim 1/534, Abu Dawud, An-Nasa'i and At- Tirmidhi."
  - parts: 
      - type: zikr
        text: سُبْحَانَ ذِي الْجَبَرُوتِ، وَالْمَلَكُوتِ، وَالْكِبْرِيَاءِ، وَالْعَظَمَةِ
    reference: "Abu Dawud 1/230, An-Nasa'i and Ahmad. Its chain of narration is good (Hasan)."
topics: 
  - Prayer
  - Salah