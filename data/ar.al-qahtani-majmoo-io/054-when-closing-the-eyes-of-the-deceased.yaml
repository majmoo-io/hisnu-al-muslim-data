title: الدعاء عند إغماض الميت
chapter: 54
items: 
  - parts: 
      - type: zikr
        text: اللَّهُـمَّ اغْفِـرْ لِـفُلانٍ (بِاسْـمِهِ) وَارْفَعْ دَرَجَتَـهُ فِي المَهْـدِيِّيـنَ ، وَاخْـلُفْـهُ فِي عَقِـبِهِ فِي الغَابِـرِينَ، وَاغْفِـرْ لَنَـا وَلَـهُ يَا رَبَّ العَـالَمِـينَ، وَافْسَـحْ لَهُ فِي قَبْـرِهِ وَنَـوِّرْ لَهُ فِيهِ
    reference: Muslim 2/634.
topics: 
  - Death
  - Funerals