title: الدعاء لمن لبس ثوباً جديداً
chapter: 4
items: 
  - parts: 
      - type: zikr
        text: تُبْلِي وَيُخْلِفُ اللَّهُ تَعَالَى
    reference: Abu Dawud 4/41. See also Al-Albani Sahih Abu Dawud 2/760.
  - parts: 
      - type: zikr
        text: اِلْبَسْ جَدِيداً وَعِشْ حَمِيداً وَمُتْ شَهِيداً
    reference: "Ibn Majah 2/1178, Al-Baghawi 12/41. See also Al-Albani, Sahih Ibn Majah 2/275"
topics: 
  - Clothing
  - Social Etiquette