title: الذكر الذي يعصم الله به من الدجال
chapter: 88
items: 
  - parts: 
      - type: zikr
        text: .(مَنْ حَفِظَ عَشْرَ آيَاتٍ مِنْ أَوَّلِ سُورَةِ الْكَهْفِ عُصِمَ مِنَ الدَّجَّالِ) ، وَالْاسْتِعَاذَةُ بِاللَّهِ مِنْ فِتْنَتِهِ عَقِبَ التَّشَهُّدِ الْأَخِيرِ مِنْ كُلِّ صَلاَةٍ.
    reference: "1 Muslim 1/555, another version mentions the last ten 'Ayat, Muslim 1/556. 2 See invocations no. 55 and 56 of this book."