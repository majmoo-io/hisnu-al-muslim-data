title: ما يعوذ به الأولاد
chapter: 48
items: 
  - parts: 
      - type: zikr
        text: "كَانَ رَسُولُ اللَّهِ صَلَّى اللَّهُ عَلَيْهِ وَسَلَّمَ يُعَوِّذُ الْحَسَنَ وَالْحُسَيْنَ \" أُعِيذُكُمَا بِكَلِمَاتِ اللَّهِ التَّامَّةِ ، مِنْ كُلِّ شَيْطَانٍ وَهَامَّةٍ ، وَمِنْ كُلِّ عَيْنٍ لَامَّةٍ \""
    reference: Al-Bukhari4/119.
topics: 
  - Children
  - Protection