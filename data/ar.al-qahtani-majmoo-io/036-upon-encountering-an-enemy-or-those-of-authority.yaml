title: دعاء لقاء العدو وذي السلطان
chapter: 36
items: 
  - parts: 
      - type: zikr
        text: اللَّهُمَّ إِنَّا نَجْعَلُكَ فِي نُحُورِهِمْ، وَنَعُوذُ بِكَ مِنْ شُرُورِهِمْ
    reference: "Abu Dawud 2/89, and Al-Hakim graded it authentic and Ath-Thahabi agreed 2/142."
  - parts: 
      - type: zikr
        text: اللَّهُمَّ أَنْتَ عَضُدِي، وَأَنْتَ نَصِيرِي، بِكَ أَجُولُ وَبِكَ أَصُولُ وَبِكَ أُقَاتِلُ
    reference: "Abu Dawud 3/42, At-Tirmidhi 5/572. See also Al-Albani, Sahih At-Tirmidhi 3/183."
  - parts: 
      - type: zikr
        text: حَسْبُنَا اللَّهُ وَنِعْمَ الْوَكِيلُ
    reference: "Al-Bukhari, 5/172."
topics: 
  - Safety
  - Protection