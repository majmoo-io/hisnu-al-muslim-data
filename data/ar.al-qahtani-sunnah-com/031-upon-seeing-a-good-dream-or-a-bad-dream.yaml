title: ما يفعل من رأى الرؤيا أو الحلم
chapter: 31
items: 
  - parts: 
      - type: zikr
        text: يَنْفُثُ عَنْ يَسَارِهِ (ثلاثاً). يَسْتَعِيذُ بِاللَّهِ مِنَ الشَّيطَانِ وَمِنْ شَرِّ مَا رَأَى (ثَلاَثَ مَرَّاتٍ). لاَ يُحَدِّثْ بِهَا أَحَداً. يَــتَحَوَّلُ عَنْ جَنْبِهِ الَّذِي كَانَ عَلَيْهِ.
    reference: "1. Muslim 4/1 772. 2. Muslim 4/1 772, 3. 3. Muslim 4/1772. 4. Muslim 4/1773."
  - parts: 
      - type: zikr
        text: يقوم يصلي إن أراد ذلك.ويَقُومُ يُصَلِّي إِنْ أَرَادَ ذَلِكَ.
    reference: Muslim 4/1773.