title: كيف يلبي المحرم في الحج أو العمرة
chapter: 115
items: 
  - parts: 
      - type: zikr
        text: لَبَّيْكَ اللَّهُمَّ لَبَّيْكَ، لَبَّيْكَ لَا شَرِيكَ لَكَ لَبَّيْكَ، إِنَّ الْحَمْدَ وَالنِّعْمَةَ لَكَ وَالْمُلْكَ، لَا شَرِيكَ لَكَ
    reference: "Al-Bukhari, cf. Al-Asqalani, Fathul-Bari 3/408, Muslim 2/841."
topics: 
  - Hajj
  - Umrah