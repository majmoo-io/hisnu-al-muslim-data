title: دعاء زيارة القبور
chapter: 60
items: 
  - parts: 
      - type: zikr
        text: السَّلامُ عَلَـيْكُمْ أَهْلَ الدِّيارِ مِنَ المؤْمِنيـنَ وَالْمُسْلِمين، وَإِنّا إِنْ شاءَ اللهُ بِكُـمْ لاحِقـون، نَسْـاَلُ اللهَ لنـا وَلَكُـمْ العـافِيَة
    reference: "Muslim 2/671, Ibn Majah 1/494, the portion brackets is from Muslim 2/671."