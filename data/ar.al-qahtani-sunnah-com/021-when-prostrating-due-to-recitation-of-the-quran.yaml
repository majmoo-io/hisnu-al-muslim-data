title: دعاء سجود التلاوة
chapter: 21
items: 
  - parts: 
      - type: zikr
        text: سَجَـدَ وَجْهـي للَّـذي خَلَقَـهُ وَشَقَّ سَمْـعَـهُ وَبَصَـرَهُ بِحَـوْلِـهِ وَقُـوَّتِهِ ﴿فتَبـارَكَ اللهُ أَحْسَـنُ الخـالِقيـن﴾.
    reference: "At-Tirmidhi 2/474, Ahmad 6/30, and Al-Hakim"
  - parts: 
      - type: zikr
        text: اللّهُـمَّ اكْتُـبْ لي بِهـا عِنْـدَكَ أَجْـراً ، وَضَـعْ عَنِّـي بِهـا وِزْراً ، وَاجْعَـلها لي عِنْـدَكَ ذُخْـراً ، وَتَقَبَّـلها مِنِّي كَمَا تَقَبَّلْتَهَا مِنْ عَبْدِكَ دَاوُدَ.
    reference: "At-Tirmidhi 2/473, and Al-Hakim who graded it authentic and Ath-Thahabi agreed 1/219."