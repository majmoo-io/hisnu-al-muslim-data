title: ما يقال في المجلس
chapter: 84
items: 
  - parts: 
      - type: zikr
        text: "عَنِ ابْنِ عُمَرَ قَالَ : كَانَ يُعَدُّ لِرَسُولِ اللَّهِ صَلَّى اللَّهُ عَلَيْهِ وَسَلَّمَ فِي الْمَجْلِسِ الْوَاحِدِ مِائَةُ مَرَّةٍ مِنْ قَبْلِ أَنْ يَقُومَ \"رَبِّ اغْفِرْ لِي وَتُبْ عَلَيَّ إِنَّكَ أَنْتَ التَّوَّابُ الْغَفُورُ\""
    reference: "Sahih Ibn Majah 2/321. See also Al-Albani, Sahih At-Tirmidhi 3/153."
topics: 
  - Gatherings
  - Remembrance