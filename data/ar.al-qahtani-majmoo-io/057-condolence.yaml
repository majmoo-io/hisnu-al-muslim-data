title: دعاء التعزية
chapter: 57
items: 
  - parts: 
      - type: zikr
        text: "\"إِنَّ لِلَّهِ مَا أَخَذَ وَلَهُ مَا أَعْطَى . وَكُلُّ شَيْءٍ عِنْدَهُ بِأَجَلٍ مُسَمًّى ... فَلْتَصْبِرْ وَلْتَحْتَسِبْ \" وَإِنْ قَالَ : \"أَعْظَمَ اللَّهُ أَجْرَكَ ، وَأَحْسَنَ عَزَاءَكَ وَغَفَرَ لِمَيِّتِكَ\" فَحَسَنٌ"
    reference: "1 Al-Bukhari 2/80, Muslim 2/636. 2An-Nawawi, Kitabul-'Athkar, p. 126."
topics: 
