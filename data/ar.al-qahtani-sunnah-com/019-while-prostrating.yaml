title: دعاء السجود
chapter: 19
items: 
  - parts: 
      - type: zikr
        text: سُبْـحانَ رَبِّـيَ الأَعْلـى.
      - type: instruction
        text: (ثلاث مرات)
    reference: "Abu Dawud, Ibn Majah, An-Nasa'i, At-Tirmidhi, and Ahmad. See also Al-Albani, Sahih At-Tirmidhi 1/83."
  - parts: 
      - type: zikr
        text: سُبْـحانَكَ اللّهُـمَّ رَبَّـنا وَبِحَـمْدِكَ ، اللّهُـمَّ اغْفِرْ لي
    reference: "Al-Bukhari and Muslim, see invocation no. 34 above."
  - parts: 
      - type: zikr
        text: سُبـّوحٌ قُـدّوس، رَبُّ الملائِكَـةِ وَالـرُّوح
    reference: "Muslim 1/533, see invocation no. 35 above."
  - parts: 
      - type: zikr
        text: اللّهُـمَّ لَكَ سَـجَدْتُ وَبِـكَ آمَنْـت ، وَلَكَ أَسْلَـمْت ، سَجَـدَ وَجْهـي للَّـذي خَلَقَـهُ وَصَـوَّرَهُ وَشَقَّ سَمْـعَـهُ وَبَصَـرَه ، تَبـارَكَ اللهُ أَحْسـنُ الخـالِقيـن
    reference: Muslim 1/534 and others.
  - parts: 
      - type: zikr
        text: سُبْـحانَ ذي الْجَبَـروت، والمَلَكـوت، والكِبْـرِياء، وَالعَظَمَـةِ.
    reference: "Abu Dawud 1/230, An-Nasa'i, Ahmad. See also Al-Albani, Sahih Abu Dawud 1/166, see invocation no. 37 above."
  - parts: 
      - type: zikr
        text: اللّهُـمَّ اغْفِـرْ لي ذَنْـبي كُلَّـه ، دِقَّـهُ وَجِلَّـه ، وَأَوَّلَـهُ وَآخِـرَه ، وَعَلانِيَّتَـهُ وَسِـرَّه
    reference: Muslim 1/350.
  - parts: 
      - type: zikr
        text: اللّهُـمَّ إِنِّـي أَعـوذُ بِرِضـاكَ مِنْ سَخَطِـك ، وَبِمعـافاتِـكَ مِنْ عُقوبَـتِك ، وَأَعـوذُ بِكَ مِنْـك ، لا أُحْصـي ثَنـاءً عَلَـيْك ، أَنْـتَ كَمـا أَثْنَـيْتَ عَلـى نَفْسـِك
    reference: Muslim 1/352.