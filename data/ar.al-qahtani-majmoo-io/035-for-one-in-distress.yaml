title: دعاء الكرب
chapter: 35
items: 
  - parts: 
      - type: zikr
        text: لَا إِلَهَ إِلَّا اللَّهُ الْعَظِيمُ الْحَلِيمُ، لَا إِلَهَ إِلَّا اللَّهُ رَبُّ الْعَرْشِ الْعَظِيمِ، لَا إِلَهَ إِلَّا اللَّهُ رَبُّ السَّمَوَاتِ وَرَبُّ الْأَرْضِ وَرَبُّ الْعَرْشِ الْكَرِيمِ
    reference: "Al-Bukhari 8/154, Muslim 4/2092"
  - parts: 
      - type: zikr
        text: اللَّهُمَّ رَحْمَتَكَ أَرْجُو فَلَا تَكِلْنِي إِلَى نَفْسِي طَرْفَةَ عَيْنٍ، وَأَصْلِحْ لِي شَأْنِي كُلَّهُ لَا إِلَهَ إِلَّا أَنْتَ
    reference: "Abu Dawud 4/324, Ahmad 5/42. Al-Albani graded it as good in Sahih Abu Dawud 3/959."
  - parts: 
      - type: zikr
        text: لَا إِلَهَ إِلَّا أَنْتَ سُبْحَانَكَ إِنِّي كُنْتُ مِنَ الظَّالِمِينَ
    reference: "At-Tirmidhi 5/529. Al-Hakim declared it authentic and Ath-Thahabi agreed with him 1/ 505. See also Al-Albani, Sahih At-Tirmidhi 3/168."
  - parts: 
      - type: zikr
        text: اللَّهُ اللَّهُ رَبِّي لَا أُشْرِكُ بِهِ شَيْئاً
    reference: "Abu Dawud 2/87. See also Al-Albani, Sahih Ibn Mdjah 2/335."
topics: 
  - Difficulty
  - Relief