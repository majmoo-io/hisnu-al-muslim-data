title: الدعاء لمن سببته
chapter: 112
items: 
  - parts: 
      - type: zikr
        text: "قَالَ صَلَّى اللَّهُ عَلَيْهِ وَسَلَّمَ: \"اللَّهُمَّ فَأَيُّمَا مُؤْمِنٍ سَبَبْتُهُ فَاجْعَلْ ذَلِكَ لَهُ قُرْبَةً إِلَيْكَ يَوْمَ الْقِيَامَةِ\""
    reference: "Al-Bukhari, cf. Al-Asqalani, Fathul-Bari 11/171, Muslim 4/2007. The wording in Muslim's report is: 'make it a purification for him and a source of mercy."
topics: 
  - Character
  - Forgiveness