title: دعاء من أصابه شك في الإيمان
chapter: 40
items: 
  - parts: 
      - type: zikr
        text: يَسْتَعِيذُ بِاللَّهِ. يَنْتَهِي عَمَّا شَكَّ فِيهِ.
    reference: "Al-Bukhari, cf. Al-Asqalani, Fathul-Bari 6/336, Muslim 1/120."
  - parts: 
      - type: zikr
        text: "يَقُولُ \"آمَنْتُ بِاللَّهِ وَرُسُلِهِ\""
    reference: "Muslim, 1/119-20."
  - parts: 
      - type: zikr
        text: يَقْرَأُ قَوْلَهُ تَعَالَى ((هُوَ الْأَوَّلُ، وَالْآخِرُ، وَالظَّاهِرُ، وَالْبَاطِنُ، وَهُوَ بِكُلِّ شَيْءٍ عَلِيمٌ))
    reference: "Al-Hadid 57:3, Abu Dawud 4/329. Al-Albani graded it good in SahihAbu Dawud, 3/962."
topics: 
  - Faith
  - Heart