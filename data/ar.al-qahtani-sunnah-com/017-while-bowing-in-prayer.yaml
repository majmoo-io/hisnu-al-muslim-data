title: دعاء الركوع
chapter: 17
items: 
  - parts: 
      - type: zikr
        text: سُبْـحانَ رَبِّـيَ الْعَظـيم
      - type: instruction
        text: (ثلاث مرات)
    reference: "Abu Dawud, Ibn Majah, An-Nasa'i, At-Tirmidhi, and Ahmad. See Al-Albani's Sahih At-Tirmidhi 1/83."
  - parts: 
      - type: zikr
        text: سُبْـحانَكَ اللّهُـمَّ رَبَّـنا وَبِحَـمْدِك ، اللّهُـمَّ اغْفِـرْ لي
    reference: "Al-Bukhari 1/99, Muslim 1/350."
  - parts: 
      - type: zikr
        text: سُبـّوحٌ قُـدّْوس ، رَبُّ الملائِكَـةِ وَالـرُّوح
    reference: "Muslim 1/353, Abu Dawud 1/230."
  - parts: 
      - type: zikr
        text: اللّهُـمَّ لَكَ رَكَـعْتُ وَبِكَ آمَـنْت، ولَكَ أَسْلَـمْت ، خَشَـعَ لَكَ سَمْـعي، وَبَصَـري ، وَمُخِّـي، وَعَظْمـي، وَعَصَـبي ، وَما استَقَـلَّ بِهِ قَدَمي
    reference: "Muslim 1/534, Abu Dawud, An-Nasa'i and At- Tirmidhi."
  - parts: 
      - type: zikr
        text: سُبْـحانَ ذي الْجَبَـروت، والمَلَـكوت، وَالكِبْـرِياء، وَالْعَظَـمَةِ
    reference: "Abu Dawud 1/230, An-Nasa'i and Ahmad. Its chain of narration is good (Hasan)."