title: من أدعية الاستسقاء
chapter: 63
items: 
  - parts: 
      - type: zikr
        text: اللَّهُمَّ اسْقِنَا غَيْثاً مُغِيثاً مَرِيئاً مُرِيعاً، نَافِعاً غَيْرَ ضَارٍّ، عَاجِلاً غَيْرَ آجِلٍ
    reference: Abu Dawud 1/303. See also Al-Albani SahihAbu Dawud 1/216.
  - parts: 
      - type: zikr
        text: اللَّهُمَّ أَغِثْنَا، اللَّهُمَّ أَغِثْنَا، اللَّهُمَّ أَغِثْنَا
    reference: "Al-Bukhari 1/224, Muslim 2/613."
  - parts: 
      - type: zikr
        text: اللَّهُمَّ اسْقِ عِبَادَكَ وَبَهَائِمَكَ، وَانْشُرْ رَحْمَتَكَ وَأَحْيِي بَلَدَكَ الْمَيِّتَ
    reference: Abu Dawud 1/305. Al-Albani graded it good in Sahih Abu Dawud 1/218.
topics: 
  - Nature
  - Prayer