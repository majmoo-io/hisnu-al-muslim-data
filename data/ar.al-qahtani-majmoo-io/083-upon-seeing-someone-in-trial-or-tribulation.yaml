title: دعاء من رأى مبتلى
chapter: 83
items: 
  - parts: 
      - type: zikr
        text: الْحَمْدُ لِلَّهِ الَّذِي عَافَانِي مِمَّا ابْتَلَاكَ بِهِ، وَفَضَّلَنِي عَلَى كَثِيرٍ مِمَّنْ خَلَقَ تَفْضِيلاً
    reference: "At-Tirmidhi 5/493,4. See also Al-Albani, Sahih At-Tirmidhi 3/153."
topics: 
  - Health
  - Gratitude