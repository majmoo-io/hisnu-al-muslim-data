title: دعاء السجود
chapter: 19
items: 
  - parts: 
      - type: zikr
        text: سُبْحَانَ رَبِّيَ الْأَعْلَى.
      - type: instruction
        text: (ثلاث مرات)
    reference: "Abu Dawud, Ibn Majah, An-Nasa'i, At-Tirmidhi, and Ahmad. See also Al-Albani, Sahih At-Tirmidhi 1/83."
  - parts: 
      - type: zikr
        text: سُبْحَانَكَ اللَّهُمَّ رَبَّنَا وَبِحَمْدِكَ، اللَّهُمَّ اغْفِرْ لِي
    reference: "Al-Bukhari and Muslim, see invocation no. 34 above."
  - parts: 
      - type: zikr
        text: سُبُّوحٌ قُدُّوسٌ، رَبُّ الْمَلَائِكَةِ وَالرُّوحِ
    reference: "Muslim 1/533, see invocation no. 35 above."
  - parts: 
      - type: zikr
        text: اللَّهُمَّ لَكَ سَجَدْتُ وَبِكَ آمَنْتُ، وَلَكَ أَسْلَمْتُ، سَجَدَ وَجْهِي لِلَّذِي خَلَقَهُ وَصَوَّرَهُ وَشَقَّ سَمْعَهُ وَبَصَرَهُ، تَبَارَكَ اللَّهُ أَحْسَنُ الْخَالِقِينَ
    reference: Muslim 1/534 and others.
  - parts: 
      - type: zikr
        text: سُبْحَانَ ذِي الْجَبَرُوتِ، وَالْمَلَكُوتِ، وَالْكِبْرِيَاءِ، وَالْعَظَمَةِ.
    reference: "Abu Dawud 1/230, An-Nasa'i, Ahmad. See also Al-Albani, Sahih Abu Dawud 1/166, see invocation no. 37 above."
  - parts: 
      - type: zikr
        text: اللَّهُمَّ اغْفِرْ لِي ذَنْبِي كُلَّهُ، دِقَّهُ وَجِلَّهُ، وَأَوَّلَهُ وَآخِرَهُ، وَعَلَانِيَتَهُ وَسِرَّهُ
    reference: Muslim 1/350.
  - parts: 
      - type: zikr
        text: اللَّهُمَّ إِنِّي أَعُوذُ بِرِضَاكَ مِنْ سَخَطِكَ، وَبِمُعَافَاتِكَ مِنْ عُقُوبَتِكَ، وَأَعُوذُ بِكَ مِنْكَ، لَا أُحْصِي ثَنَاءً عَلَيْكَ، أَنْتَ كَمَا أَثْنَيْتَ عَلَى نَفْسِكَ
    reference: Muslim 1/352.
topics: 
  - Prayer
  - Salah