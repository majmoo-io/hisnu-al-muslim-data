title: الذكر بعد الفراغ من الوضوء
chapter: 9
items: 
  - parts: 
      - type: zikr
        text: أَشْهَدُ أَنْ لَا إِلَهَ إِلَّا اللَّهُ وَحْدَهُ لَا شَرِيكَ لَهُ وَأَشْهَدُ أَنَّ مُحَمَّداً عَبْدُهُ وَرَسُولُهُ
    reference: Muslim 1/209.
  - parts: 
      - type: zikr
        text: اللَّهُمَّ اجْعَلْنِي مِنَ التَّوَّابِينَ وَاجْعَلْنِي مِنَ الْمُتَطَهِّرِينَ.
    reference: "At-Tirmidhi 1/78. See also Al-Albani, Sahih At- Tirmidhi 1/18"
  - parts: 
      - type: zikr
        text: سُبْحَانَكَ اللَّهُمَّ وَبِحَمْدِكَ أَشْهَدُ أَنْ لَا إِلَهَ إِلَّا أَنْتَ أَسْتَغْفِرُكَ وَأَتُوبُ إِلَيْكَ
    reference: "An-Nasa'i, 'Amalul-Yawm wal-Laylah, p. 173. See also Al-Albani, 'Irwa'ul-Ghalil 1/135 and 2/94."
topics: 
  - Ablution
  - Prayer Preparation