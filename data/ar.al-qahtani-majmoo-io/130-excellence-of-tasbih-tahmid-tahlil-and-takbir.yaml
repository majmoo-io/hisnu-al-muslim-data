title: من فضل التسبيح والتحميد ، والتهليل ، والتكبير
chapter: 130
items: 
  - parts: 
      - type: zikr
        text: "قَالَ صَلَّى اللَّهُ عَلَيْهِ وَسَلَّمَ: مَنْ قَالَ (سُبْحَانَ اللَّهِ وَبِحَمْدِهِ) فِي يَوْمٍ مِائَةَ مَرَّةٍ حُطَّتْ خَطَايَاهُ وَلَوْ كَانَتْ مِثْلَ زَبَدِ الْبَحْرِ."
    reference: "Al-Bukhari 7/168, Muslim 4/2071, see also invocation no. 91 of this book."
  - parts: 
      - type: zikr
        text: "وَقَالَ صَلَّى اللَّهُ عَلَيْهِ وَسَلَّمَ: مَنْ قَالَ (لَا إِلَهَ إِلَّا اللَّهُ وَحْدَهُ لَا شَرِيكَ لَهُ، لَهُ الْمُلْكُ، وَلَهُ الْحَمْدُ، وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ) عَشْرَ مِرَارٍ، كَانَ كَمَنْ أَعْتَقَ أَرْبَعَةَ أَنْفُسٍ مِنْ وَلَدِ إِسْمَاعِيلَ."
    reference: "Al-Bukhari 7/67, Muslim 4/2071, see also invocation no. 93 of this book."
  - parts: 
      - type: zikr
        text: "وَقَالَ صَلَّى اللَّهُ عَلَيْهِ وَسَلَّمَ: كَلِمَتَانِ خَفِيفَتَانِ عَلَى اللِّسَانِ، ثَقِيلَتَانِ فِي الْمِيزَانِ، حَبِيبَتَانِ إِلَى الرَّحْمَنِ: (سُبْحَانَ اللَّهِ وَبِحَمْدِهِ)، (سُبْحَانَ اللَّهِ الْعَظِيمِ)."
    reference: "Al-Bukhari 7/168, Muslim 4/2072."
  - parts: 
      - type: zikr
        text: "وَقَالَ صَلَّى اللَّهُ عَلَيْهِ وَسَلَّمَ: لَأَنْ أَقُولَ (سُبْحَانَ اللَّهِ، وَالْحَمْدُ لِلَّهِ، وَلَا إِلَهَ إِلَّا اللَّهُ، وَاللَّهُ أَكْبَرُ)، أَحَبُّ إِلَيَّ مِمَّا طَلَعَتْ عَلَيْهِ الشَّمْسُ."
    reference: Muslim 4/2072.
  - parts: 
      - type: zikr
        text: "وَقَالَ صَلَّى اللَّهُ عَلَيْهِ وَسَلَّمَ: أَيَعْجِزُ أَحَدُكُمْ أَنْ يَكْسِبَ كُلَّ يَوْمٍ أَلْفَ حَسَنَةٍ؟ فَسَأَلَهُ سَائِلٌ مِنْ جُلَسَائِهِ كَيْفَ يَكْسِبُ أَحَدُنَا أَلْفَ حَسَنَةٍ؟ قَالَ: يُسَبِّحُ مِائَةَ تَسْبِيحَةٍ، فَيُكْتَبُ لَهُ أَلْفُ حَسَنَةٍ أَوْ يُحَطُّ عَنْهُ أَلْفُ خَطِيئَةٍ."
    reference: Muslim 4/2073.
  - parts: 
      - type: zikr
        text: مَنْ قَالَ (سُبْحَانَ اللَّهِ الْعَظِيمِ وَبِحَمْدِهِ) غُرِسَتْ لَهُ نَخْلَةٌ فِي الْجَنَّةِ.
    reference: "At-Tirmidhi 5/511, and Al-Hakim who graded it authentic and Ath-Thahabi agreed 1/501. See also Al-Albani, Sahihul-Jami' As-Saghir 5/531 and Sahih At-Tirmidhi3/160."
  - parts: 
      - type: zikr
        text: "وَقَالَ صَلَّى اللَّهُ عَلَيْهِ وَسَلَّمَ: يَا عَبْدَ اللَّهِ بْنَ قَيْسٍ أَلَا أَدُلُّكَ عَلَى كَنْزٍ مِنْ كُنُوزِ الْجَنَّةِ؟ فَقُلْتُ: بَلَى يَا رَسُولَ اللَّهِ، قَالَ: قُلْ (لَا حَوْلَ وَلَا قُوَّةَ إِلَّا بِاللَّهِ)."
    reference: "Al-Bukhari, cf. Al-Asqalani, Fathul-Bari 11/213, Muslim 4/2076."
  - parts: 
      - type: zikr
        text: "وَقَالَ صَلَّى اللَّهُ عَلَيْهِ وَسَلَّمَ: أَحَبُّ الْكَلَامِ إِلَى اللَّهِ أَرْبَعٌ: (سُبْحَانَ اللَّهِ)، وَ(الْحَمْدُ لِلَّهِ)، وَ(لَا إِلَهَ إِلَّا اللَّهُ)، وَ(اللَّهُ أَكْبَرُ)، لَا يَضُرُّكَ بِأَيِّهِنَّ بَدَأْتَ."
    reference: Muslim 3/1685.
  - parts: 
      - type: zikr
        text: "جَاءَ أَعْرَابِيٌّ إِلَى رَسُولِ اللَّهِ صَلَّى اللَّهُ عَلَيْهِ وَسَلَّمَ فَقَالَ: عَلِّمْنِي كَلَاماً أَقُولُهُ: قَالَ: قُلْ (لَا إِلَهَ إِلَّا اللَّهُ وَحْدَهُ لَا شَرِيكَ لَهُ، اللَّهُ أَكْبَرُ كَبِيراً، وَالْحَمْدُ لِلَّهِ كَثِيراً، سُبْحَانَ اللَّهِ رَبِّ الْعَالَمِينَ، لَا حَوْلَ وَلَا قُوَّةَ إِلَّا بِاللَّهِ الْعَزِيزِ الْحَكِيمِ). قَالَ: فَهَؤُلَاءِ لِرَبِّي، فَمَا لِي؟ قَالَ: قُلْ (اللَّهُمَّ اغْفِرْ لِي، وَارْحَمْنِي، وَاهْدِنِي، وَارْزُقْنِي)."
    reference: "Muslim 4/2072, Abu Dawud reports the same Hadith with the addition: and when the Arab left, the Prophet (ﷺ) said: \"He has filled his hands with goodness.\" 1/220."
  - parts: 
      - type: zikr
        text: "كَانَ الرَّجُلُ إِذَا أَسْلَمَ عَلَّمَهُ النَّبِيُّ صَلَّى اللَّهُ عَلَيْهِ وَسَلَّمَ الصَّلَاةَ ثُمَّ أَمَرَهُ أَنْ يَدْعُوَ بِهَؤُلَاءِ الْكَلِمَاتِ: (اللَّهُمَّ اغْفِرْ لِي، وَارْحَمْنِي، وَاهْدِنِي، وَعَافِنِي وَارْزُقْنِي)."
    reference: "Muslim 4/2073, and in one of Muslim's reports there is the addition: 'For these words combine [the goodness of] this world and the next.'"
  - parts: 
      - type: zikr
        text: إِنَّ أَفْضَلَ الدُّعَاءِ (الْحَمْدُ لِلَّهِ)، وَأَفْضَلَ الذِّكْرِ (لَا إِلَهَ إِلَّا اللَّهُ).
    reference: "At-Tirmidhi 5/462, Ibn Majah 2/1249, and Al-Hakim who graded it authentic and Ath-Tbahabi agreed 1/503. See Al-Albani, Sahihul-Jami' As-Saghir 1/362."
  - parts: 
      - type: zikr
        text: "الْبَاقِيَاتُ الصَّالِحَاتُ: (سُبْحَانَ اللَّهِ) وَ(الْحَمْدُ لِلَّهِ)، وَ(لَا إِلَهَ إِلَّا اللَّهُ)، وَ(اللَّهُ أَكْبَرُ)، وَ(لَا حَوْلَ وَلَا قُوَّةَ إِلَّا بِاللَّهِ)."
    reference: "Ahmad (no. 513) (Ahmad Shakir, ed.) and its chain of narration is authentic. See Majma'uz-Zawa'id 1/297. Ibn Hajar mentions it in Bulughul-Maram saying that Ibn Hibban and Al-Hakim considered it authentic."
topics: 
