title: من أدعية الاستسقاء
chapter: 63
items: 
  - parts: 
      - type: zikr
        text: اللّهُمَّ اسْقِـنا غَيْـثاً مُغيـثاً مَريئاً مُريـعاً، نافِعـاً غَيْـرَ ضار، عاجِـلاً غَـيْرَ آجِل
    reference: Abu Dawud 1/303. See also Al-Albani SahihAbu Dawud 1/216.
  - parts: 
      - type: zikr
        text: اللّهُمَّ أغِثْنـا، اللّهُمَّ أغِثْنـا، اللّهُمَّ أغِثْنـا
    reference: "Al-Bukhari 1/224, Muslim 2/613."
  - parts: 
      - type: zikr
        text: اللّهُمَّ اسْقِ عِبادَكَ وَبَهـائِمَك، وَانْشُـرْ رَحْمَـتَكَ وَأَحْيِي بَلَـدَكَ المَيِّـت
    reference: Abu Dawud 1/305. Al-Albani graded it good in Sahih Abu Dawud 1/218.