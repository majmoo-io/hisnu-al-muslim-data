title: الدعاء عند الفراغ من الطعام
chapter: 70
items: 
  - parts: 
      - type: zikr
        text: الْحَمْدُ لِلَّهِ الَّذِي أَطْعَمَنِي هَذَا وَرَزَقَنِيهِ مِنْ غَيْرِ حَوْلٍ مِنِّي وَلَا قُوَّةٍ
    reference: "At-Tirmidhi, Abu Dawud, and Ibn Majah. See also Al-Albani, Sahih At-Tirmidhi 3/159."
  - parts: 
      - type: zikr
        text: الْحَمْدُ لِلَّهِ حَمْداً كَثِيراً طَيِّباً مُبَارَكاً فِيهِ، غَيْرَ مَكْفِيٍّ وَلَا مُوَدَّعٍ وَلَا مُسْتَغْنًى عَنْهُ رَبَّنَا
    reference: "Al-Bukhari 6/214, At-Tirmidhi 5/507."
topics: 
  - Food
  - Gratitude