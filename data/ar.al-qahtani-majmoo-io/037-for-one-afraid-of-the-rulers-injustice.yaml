title: دعاء من خاف ظلم السلطان
chapter: 37
items: 
  - parts: 
      - type: zikr
        text: اللَّهُمَّ رَبَّ السَّمَوَاتِ السَّبْعِ، وَرَبَّ الْعَرْشِ الْعَظِيمِ، كُنْ لِي جَاراً مِنْ فُلاَنِ بْنِ فُلاَنٍ، وَأَحْزَابِهِ مِنْ خَلاَئِقِكَ، أَنْ يَفْرُطَ عَلَيَّ أَحَدٌ مِنْهُمْ أَوْ يَطْغَى، عَزَّ جَارُكَ، وَجَلَّ ثَنَاؤُكَ، وَلَا إِلَهَ إِلَّا أَنْتَ
    reference: "Al-Bukhari, Al-'Adab Al-Mufrad (no. 707). Al-Albani graded it authentic in Sahih Al-'Adab Al-Mufrad (no. 545)."
  - parts: 
      - type: zikr
        text: اللَّهُ أَكْبَرُ، اللَّهُ أَعَزُّ مِنْ خَلْقِهِ جَمِيعاً ، اللَّهُ أَعَزُّ مِمَّا أَخَافُ وَأَحْذَرُ ، أَعُوذُ بِاللَّهِ الَّذِي لَا إِلَهَ إِلَّا هُوَ ، الْمُمْسِكِ السَّمَوَاتِ السَّبْعِ أَنْ يَقَعْنَ عَلَى الْأَرْضِ إِلَّا بِإِذْنِهِ ، مِنْ شَرِّ عَبْدِكَ فُلَانٍ ، وَجُنُودِهِ وَأَتْبَاعِهِ وَأَشْيَاعِهِ ، مِنَ الْجِنِّ وَالْإِنْسِ ، اللَّهُمَّ كُنْ لِي جَاراً مِنْ شَرِّهِمْ ، جَلَّ ثَنَاؤُكَ وَعَزَّ جَارُكَ ، وَتَبَارَكَ اسْمُكَ ، وَلَا إِلَهَ غَيْرُكَ (ثَلَاثَ مَرَّاتٍ)
    reference: "Al-Bukhari, 5/172."
topics: 
  - Justice
  - Protection