title: الدعاء عند الفراغ من الطعام
chapter: 70
items: 
  - parts: 
      - type: zikr
        text: الْحَمْـدُ للهِ الَّذي أَطْعَمَنـي هـذا وَرَزَقَنـيهِ مِنْ غَـيْرِ حَوْلٍ مِنِّي وَلا قُوَّة
    reference: "At-Tirmidhi, Abu Dawud, and Ibn Majah. See also Al-Albani, Sahih At-Tirmidhi 3/159."
  - parts: 
      - type: zikr
        text: الْحَمْـدُ للهِ حَمْـداً كَثـيراً طَيِّـباً مُبـارَكاً فيه، غَيْرَ مَكْفِيٍّ وَلا مُوَدَّعٍ وَلا مُسْتَغْـنىً عَنْـهُ رَبَّـنا
    reference: "Al-Bukhari 6/214, At-Tirmidhi 5/507."