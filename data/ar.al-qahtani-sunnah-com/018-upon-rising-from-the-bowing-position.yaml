title: دعاء الرفع من الركوع
chapter: 18
items: 
  - parts: 
      - type: zikr
        text: سَمِـعَ اللهُ لِمَـنْ حَمِـدَه
    reference: "Al-Bukhari, cf. Al-Asqalani, Fathul-Bari 2/282."
  - parts: 
      - type: zikr
        text: رَبَّنـا وَلَكَ الحَمْـدُ حَمْـداً كَثـيراً طَيِّـباً مُـبارَكاً فيه
    reference: "Al-Bukhari, cf. Al-Asqalani, Fathul-Bari 2/284."
  - parts: 
      - type: zikr
        text: مِلْءَ السَّمـواتِ وَمِلْءَ الأَرْض، وَما بَيْـنَهُمـا ، وَمِلْءَ ما شِئْـتَ مِنْ شَيءٍ بَعْـد . أَهـلَ الثَّـناءِ وَالمَجـد ، أََحَـقُّ ما قالَ العَبْـد ، وَكُلُّـنا لَكَ عَـبد . اللّهُـمَّ لا مانِعَ لِما أَعْطَـيْت ، وَلا مُعْطِـيَ لِما مَنَـعْت ، وَلا يَنْفَـعُ ذا الجَـدِّ مِنْـكَ الجَـد
    reference: Muslim 1/346.