title: دعاء القلق والفزع في النوم ومن بلي بالوحشة
chapter: 30
items: 
  - parts: 
      - type: zikr
        text: أَعـوذُ بِكَلِمـاتِ اللّهِ التّـامّـاتِ مِن غَضَـبِهِ وَعِـقابِهِ وَشَـرِّ عِبـادِهِ وَمِنْ هَمَـزاتِ الشَّـياطينِ وَأَنْ يَحْضـرون
    reference: "Abu Dawud 4/12. See also Al-Albani, Sahih At- Tirmidhi 3/171"