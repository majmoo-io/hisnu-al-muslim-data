title: من أدعية الاستصحاء
chapter: 66
items: 
  - parts: 
      - type: zikr
        text: اللَّهُمَّ حَوَالَيْنَا وَلَا عَلَيْنَا، اللَّهُمَّ عَلَى الْآكَامِ وَالظِّرَابِ، وَبُطُونِ الْأَوْدِيَةِ، وَمَنَابِتِ الشَّجَرِ
    reference: "Al-Bukhari 1/224, Muslim 1/614"
topics: 
  - Nature
