title: كيف كان النبي ﷺ يسبح ؟
chapter: 131
items: 
  - parts: 
      - type: zikr
        text: "عَنْ عَبْدِ اللَّهِ بْنِ عَمْرٍو رَضِيَ اللَّهُ عَنْهُمَا قَالَ: رَأَيْتُ النَّبِيَّ صَلَّى اللَّهُ عَلَيْهِ وَسَلَّمَ يَعْقِدُ التَّسْبِيحَ بِيَمِينِهِ."
    reference: "Abu Dawud with a different wording 2/81, and At-Tirmidhi 5/521. See also Al-Albani, Sahihul-Jami'As-Saghir 4/271 (no. 4865)."
topics: 
  - Remembrance
  - Sunnah