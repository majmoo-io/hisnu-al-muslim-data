title: دعاء لقاء العدو وذي السلطان
chapter: 36
items: 
  - parts: 
      - type: zikr
        text: اللّهُـمَّ إِنا نَجْـعَلُكَ في نُحـورِهِـم، وَنَعـوذُ بِكَ مِنْ شُرورِهـمْ
    reference: "Abu Dawud 2/89, and Al-Hakim graded it authentic and Ath-Thahabi agreed 2/142."
  - parts: 
      - type: zikr
        text: اللّهُـمَّ أَنْتَ عَضُـدي، وَأَنْتَ نَصـيري، بِكَ أَجـولُ وَبِكَ أَصـولُ وَبِكَ أُقـاتِل
    reference: "Abu Dawud 3/42, At-Tirmidhi 5/572. See also Al-Albani, Sahih At-Tirmidhi 3/183."
  - parts: 
      - type: zikr
        text: حَسْبُـنا اللهُ وَنِعْـمَ الوَكـيل
    reference: "Al-Bukhari, 5/172."